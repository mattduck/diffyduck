# revparrot.toml — reviewparrot (rpt) rule config for this repo.

[revparrot]
include = ["**/*"]

[[rules]]
code = "comment-terminal-punctuation"
type = "refactor"
title = "Inline comments should end with terminal punctuation"
description = """
Inline comments — the `//` comments that sit on their own line inside a
function body to explain the code below them — should read as complete
sentences and end with terminal punctuation (`.`, `?`, or `!`).

Flag any such inline comment whose text does not end with terminal
punctuation. Out of scope (do NOT flag): doc comments that sit immediately
above a declaration (func/type/var/const), trailing comments on the same line
as code, comment directives (e.g. `//go:`), and commented-out code.
"""
include = ["**/*.go"]
model = "haiku"
effort = "low"

[[rules]]
code = "git-isolation-in-tests"
type = "bug"
title = "Git commands must use a sanitised/isolated environment"
description = """
Per CLAUDE.md: tests must never run a raw `exec.Command("git", ...)` (or
`exec.CommandContext`) against an environment that still carries GIT_DIR,
GIT_WORK_TREE, or GIT_INDEX_FILE — those get set by pre-commit hooks and can
redirect git commands at the real project repo, corrupting state.

Flag any `exec.Command("git", ...)` / `exec.CommandContext(ctx, "git", ...)`
call whose surrounding code does not clearly set `cmd.Env` from a sanitised
environment (e.g. a `cleanGitEnv()`-style helper that strips those three
variables) before running. In production code under pkg/git/, calls should go
through `g.command(...)` / `g.commandWithEnv(...)` instead of exec.Command
directly.

Out of scope (do NOT flag): cmd/rpt/ — its diffedFiles() and completion code
intentionally call exec.Command("git", ...) directly, always pinned with
`-C <gitRoot>`, and do not inherit GIT_DIR during normal CLI use. This is a
documented, deliberate exception, not a violation.
"""
include = ["**/*.go"]
exclude = ["cmd/rpt/**"]
model = "sonnet"
effort = "medium"
