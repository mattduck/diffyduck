; Sample INI configuration file for syntax highlighting
; This is a comment

[general]
app_name = Sample Application
version = 1.0.0
debug = true
log_level = info

[database]
host = localhost
port = 5432
name = myapp_db
user = admin
password = secret123
max_connections = 100
ssl_mode = require

[server]
listen_address = 0.0.0.0
listen_port = 8080
timeout = 30
max_request_size = 10485760

[cache]
enabled = true
backend = redis
redis_host = 127.0.0.1
redis_port = 6379
ttl = 3600

[logging]
; Logging configuration
file = /var/log/app.log
format = json
rotate = daily
keep_days = 30

[features]
enable_signup = true
enable_oauth = false
maintenance_mode = false

[paths]
data_dir = /var/lib/app/data
temp_dir = /tmp/app
upload_dir = /var/lib/app/uploads

[limits]
max_users = 1000
rate_limit = 100
burst_limit = 20
