# Sample TOML file for testing syntax highlighting

[package]
name = "my-application"
version = "1.2.3"
authors = ["Alice <alice@example.com>", "Bob <bob@example.com>"]
edition = "2021"

[features]
default = ["std"]
std = []
debug = ["dep:log"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.0", optional = true }

[dependencies.reqwest]
version = "0.11"
default-features = false
features = ["json", "rustls-tls"]

[dev-dependencies]
criterion = "0.5"

[build-dependencies]
cc = "1.0"

[[bin]]
name = "cli"
path = "src/cli.rs"

[[test]]
name = "integration"
path = "tests/integration.rs"

[profile.release]
opt-level = 3
lto = true
debug = false

[server]
host = "0.0.0.0"
port = 8080
max_connections = 1000
timeout = 30.5

[database]
url = "postgres://localhost/mydb"
pool_size = 10
enabled = true

# Date/time examples
[timestamps]
created = 1979-05-27T07:32:00Z
updated = 1979-05-27
time = 07:32:00
